  <script>
    (function(){
      const SECRET_TEXT = 'YQDYIpjYnF7PZtDYs6e8yZJmGqTuB4rgZQSaenc618nmy4x095';
      const overlay = document.getElementById('loginOverlay');
      const fileInput = document.getElementById('loginFileInput');
      const msg = document.getElementById('loginMsg');
      const logoutBtn = document.getElementById('logoutBtn');
      const pageContent = document.getElementById('pageContent');
      const fileUploadArea = document.getElementById('fileUploadArea');
      const fileNameDisplay = document.getElementById('fileNameDisplay');

      function lockPage() {
        overlay.style.display = 'flex';
        document.documentElement.classList.add('lock-scroll');
        document.body.classList.add('lock-scroll');
        if (pageContent) pageContent.classList.add('blurred');
      }
      function unlockPage() {
        overlay.style.display = 'none';
        document.documentElement.classList.remove('lock-scroll');
        document.body.classList.remove('lock-scroll');
        if (pageContent) pageContent.classList.remove('blurred');
        logoutBtn.style.display = 'inline-flex';
        localStorage.setItem('dekrip_logged_in', 'true');
      }
      function resetAccess() {
        fileInput.value = '';
        msg.textContent = '';
        msg.className = '';
        fileNameDisplay.style.display = 'none';
        logoutBtn.style.display = 'none';
        localStorage.removeItem('dekrip_logged_in');
        lockPage();
      }
      function showLoginMsg(text, type) {
        msg.textContent = text;
        msg.className = 'has-msg ' + type;
      }

      lockPage();

      fileUploadArea.addEventListener('click', () => fileInput.click());

      fileUploadArea.addEventListener('dragover', (e) => {
        e.preventDefault();
        fileUploadArea.classList.add('dragover');
      });
      fileUploadArea.addEventListener('dragleave', () => {
        fileUploadArea.classList.remove('dragover');
      });

    function decryptCaesar(text, shift) {
        if (typeof text !== 'string') return text;
        const s = Number(shift);
        if (isNaN(s)) return text;
        let result = '';
        for (let i = 0; i < text.length; i++) {
            let code = text.charCodeAt(i);
            if (code >= 65 && code <= 90) code = ((code - 65 - s + 260) % 26) + 65;
            else if (code >= 97 && code <= 122) code = ((code - 97 - s + 260) % 26) + 97;
            result += String.fromCharCode(code);
        }
        return result;
    }

    function normalizeBase64(b64) {
        if (!b64 || typeof b64 !== 'string') return '';
        let s = b64.replace(/\s+/g, '');
        const dataMatch = s.match(/^data:.*;base64,(.*)$/i);
        if (dataMatch) s = dataMatch[1];
        s = s.replace(/-/g, '+').replace(/_/g, '/');
        const pad = s.length % 4;
        if (pad === 2) s += '=='; else if (pad === 3) s += '=';
        return s;
    }

    function isBase64String(s) {
        if (!s || typeof s !== 'string') return false;
        const cleaned = normalizeBase64(s);
        return cleaned.length % 4 === 0 && /^[A-Za-z0-9+/=]+$/.test(cleaned);
    }

    function getMimeFromBase64Sample(b64) {
        try {
            const cleaned = normalizeBase64(b64).slice(0, 2000);
            if (!cleaned) return null;
            const bin = atob(cleaned);
            const c0 = bin.charCodeAt(0), c1 = bin.charCodeAt(1);
            if (c0 === 0x89 && bin[1] === 'P' && bin[2] === 'N' && bin[3] === 'G') return 'image/png';
            if (c0 === 0xFF && c1 === 0xD8) return 'image/jpeg';
            if (bin.startsWith('GIF87a') || bin.startsWith('GIF89a')) return 'image/gif';
            if (bin.trim().startsWith('<svg')) return 'image/svg+xml';
            if (bin.indexOf('ftyp') !== -1) return 'video/mp4';
            if (bin.toLowerCase().indexOf('webm') !== -1) return 'video/webm';
            const prefix = normalizeBase64(b64).slice(0, 8);
            if (prefix.startsWith('iVBOR') || prefix.startsWith('iVBORw0K')) return 'image/png';
            if (prefix.startsWith('/9j/')) return 'image/jpeg';
            if (prefix.startsWith('R0lG')) return 'image/gif';
            return null;
        } catch (e) { return null; }
    }

    function base64ToBlob(base64, mime) {
        const binary = atob(base64);
        const len = binary.length;
        const arr = new Uint8Array(len);
        for (let i = 0; i < len; i++) arr[i] = binary.charCodeAt(i);
        return new Blob([arr], { type: mime || 'application/octet-stream' });
    }

    function setPreviewFromBase64(rawBase64, mimeHint, useBlobIfLarge = true) {
        const cleaned = normalizeBase64(rawBase64);
        if (!cleaned) { descriptionContent.innerHTML = '<p class="text-red-500">Data base64 kosong.</p>'; return; }
        let mime = mimeHint || getMimeFromBase64Sample(cleaned);
        if (!mime) {
            if (cleaned.startsWith('iVBOR') || cleaned.startsWith('iVBORw0K')) mime = 'image/png';
            else if (cleaned.startsWith('/9j/')) mime = 'image/jpeg';
            else if (cleaned.startsWith('R0lG')) mime = 'image/gif';
        }
        descriptionContent.innerHTML = '';
        const threshold = 1024 * 300;
        const approximateSize = Math.ceil((cleaned.length * 3) / 4);
        let blob = null;

        if (useBlobIfLarge && approximateSize > threshold) {
            try {
                blob = base64ToBlob(cleaned, mime);
                const objectUrl = URL.createObjectURL(blob);
                if (mime && mime.startsWith('image/')) {
                    const img = document.createElement('img');
                    img.src = objectUrl;
                    img.className = 'media-preview rounded-md border border-gray-200';
                    img.onload = () => URL.revokeObjectURL(objectUrl);
                    descriptionContent.appendChild(img);
                } else if (mime && mime.startsWith('video/')) {
                    const video = document.createElement('video');
                    video.src = objectUrl; video.controls = true;
                    video.className = 'video-preview rounded-md border border-gray-200';
                    video.onloadeddata = () => URL.revokeObjectURL(objectUrl);
                    descriptionContent.appendChild(video);
                } else {
                    const a = document.createElement('a');
                    a.href = objectUrl; a.download = 'file.bin';
                    a.textContent = 'Unduh file (tipe media tidak terdeteksi)';
                    a.className = 'underline text-blue-600';
                    descriptionContent.appendChild(a);
                }
            } catch (err) { blob = null; }
        }
        if (!blob) {
            const dataMime = mime || 'application/octet-stream';
            const dataUrl = `data:${dataMime};base64,${cleaned}`;
            if (dataMime.startsWith('image/')) {
                const img = document.createElement('img');
                img.src = dataUrl;
                img.className = 'media-preview rounded-md border border-gray-200';
                descriptionContent.appendChild(img);
            } else if (dataMime.startsWith('video/')) {
                const video = document.createElement('video');
                video.src = dataUrl; video.controls = true;
                video.className = 'video-preview rounded-md border border-gray-200';
                video.setAttribute('playsinline', '');
                descriptionContent.appendChild(video);
            } else {
                const pre = document.createElement('pre');
                pre.textContent = cleaned.slice(0, 2000) + (cleaned.length > 2000 ? '\n\n... (terpotong) ...' : '');
                pre.className = 'p-4 bg-gray-50 rounded-md text-sm max-h-96 overflow-auto w-full';
                descriptionContent.appendChild(pre);
            }
        }
        return { blob, mime };
    }

                const smallQrId = `qr-${link.id}`;

                card.innerHTML = `
                    <button class="card-info-btn" title="Lihat URL & Kode Shift">!</button>
                    <div class="link-card-qr" title="Klik untuk memperbesar QR">
                      <canvas id="${smallQrId}" style="width:100px;height:100px;"></canvas>
                    </div>
                    <div class="link-card-body">
                      <div class="link-card-title" data-column="name">${link.name || '-'}</div>
                      <div class="link-card-person" data-column="person_name">${link.person_name || '-'}</div>
                      <div class="link-card-category" data-column="category">${category}</div>
                      <div class="link-card-meta"><i class="fa-regular fa-clock" style="margin-right:0.2rem;"></i>${formattedDate}</div>
                    </div>
                    <div class="link-card-actions">
                      <button class="card-btn-view view-description-btn"><i class="fa-solid fa-eye" style="margin-right:0.3rem;"></i>Lihat</button>
                      <button class="card-btn-delete delete-btn"><i class="fa-solid fa-trash-can" style="margin-right:0.3rem;"></i>Hapus</button>
                    </div>
                `;

                linksGrid.appendChild(card);

                QRCode.toCanvas(document.getElementById(smallQrId), qrData, {
                    errorCorrectionLevel: 'L', margin: 1, width: 100,
                    color: { dark: '#000000', light: '#ffffff' }
                });

                // Info button
                const infoBtn = card.querySelector('.card-info-btn');
                infoBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    openInfoPopup(link.id, link.name, link.url, link.shift_code);
                });

                // QR enlarge
                const qrClickArea = card.querySelector('.link-card-qr');
                qrClickArea.addEventListener('click', () => {
                    enlargedQrContainer.innerHTML = '';
                    generateQrCodeWithPadding(qrData, 256, 12).then(canvas => {
                        enlargedQrContainer.appendChild(canvas);
                        canvas.style.borderRadius = '0.375rem';
                        canvas.style.display = 'block';
                        currentQrFilename = `${qrFilenameBase}.png`;
                        qrModal.classList.remove('hidden');
                    });
                });

                // View button
                const viewBtn = card.querySelector('.view-description-btn');
                if (viewBtn) {
                    viewBtn.addEventListener('click', () => {
                        const urlParam = encodeURIComponent(link.url || '');
                        const shiftParam = encodeURIComponent(link.shift_code || '');
                        const personParam = encodeURIComponent(link.person_name || '');
                        const nameParam = encodeURIComponent(link.name || '');
                        const targetUrl = `dekripsi.html?url=${urlParam}&shift=${shiftParam}&person=${personParam}&name=${nameParam}`;
                        window.open(targetUrl, '_blank');
                    });
                }

                // Delete button
                const deleteBtn = card.querySelector('.delete-btn');
                deleteBtn.addEventListener('click', handleDelete);

                // Triple-click edit on card fields (name, person_name, category)
                const editableCells = card.querySelectorAll('[data-column]');
                editableCells.forEach(cell => {
                    cell.addEventListener('click', (e) => {
                        const now = Date.now();
                        const diff = now - lastClickTime;
                        clickCount = (diff < 300 && clickCount < 3) ? clickCount + 1 : 1;
                        lastClickTime = now;
                        if (clickCount === 3) {
                            e.preventDefault();
                            cell.contentEditable = 'true';
                            cell.classList.add('editable');
                            cell.focus();
                            cell.removeEventListener('blur', handleEditCard);
                            cell.removeEventListener('keydown', handleEnter);
                            cell.addEventListener('blur', handleEditCard);
                            cell.addEventListener('keydown', handleEnter);
                        }
                    });
                });
            });

        } catch (err) {
            loadingIndicator && loadingIndicator.classList.add('hidden');
            showStatus(`Terjadi kesalahan: ${err.message}`, 'error');
        }
    }

    document.addEventListener('DOMContentLoaded', fetchLinks);
  </script>

</body>
</html>

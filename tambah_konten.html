<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistem Enkripsi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <!-- CryptoJS for AES -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }

        .tab-content {
            overflow: hidden;
            transition: max-height 0.4s ease-in-out, opacity 0.4s ease-in-out;
            max-height: 2000px;
            opacity: 1;
        }
        .tab-content.tab-hidden {
            max-height: 0;
            opacity: 0;
            padding-top: 0 !important;
            padding-bottom: 0 !important;
            margin-top: 0 !important;
            margin-bottom: 0 !important;
        }

        #modal-container {
            transition: opacity 0.3s ease-in-out;
            opacity: 0;
            visibility: hidden;
        }
        #modal-container.show { opacity: 1; visibility: visible; }
        #modal-container .bg-white {
            transform: scale(0.9);
            transition: transform 0.3s ease-in-out;
        }
        #modal-container.show .bg-white { transform: scale(1); }

        /* GitHub repo list */
        .repo-item {
            cursor: pointer;
            transition: background 0.15s;
        }
        .repo-item:hover { background: #eff6ff; }
        .repo-item.selected { background: #dbeafe; border-color: #3b82f6; }

        /* Progress bar */
        #progress-bar {
            transition: width 0.3s ease;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 bg-gray-100">
    <div class="max-w-sm w-full md:max-w-md">
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-8">Sistem Enkripsi</h1>

        <!-- Tab Buttons -->
        <div class="flex border-b border-gray-300 mb-6">
            <button id="tab1-btn" class="flex-1 py-3 text-center text-base font-medium text-gray-700 hover:text-blue-600 focus:outline-none focus:text-blue-600 border-b-2 border-transparent hover:border-blue-500 transition-colors duration-200">
                Tambah Tautan
            </button>
            <button id="tab2-btn" class="flex-1 py-3 text-center text-base font-medium text-gray-700 hover:text-blue-600 focus:outline-none focus:text-blue-600 border-b-2 border-transparent hover:border-blue-500 transition-colors duration-200">
                Enkripsi File
            </button>
        </div>

        <!-- Tab 1: Tambah Tautan -->
        <div id="tab1-content" class="tab-content">
            <form id="singleAddForm">
                <div class="mb-4">
                    <label for="personName" class="block text-sm font-medium text-gray-700 mb-2">Nama Orang</label>
                    <input type="text" id="personName" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors" required>
                </div>
                <div class="mb-4">
                    <label for="linkName" class="block text-sm font-medium text-gray-700 mb-2">Nama Tautan</label>
                    <input type="text" id="linkName" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors" required>
                </div>
                <div class="mb-4">
                    <label for="linkUrl" class="block text-sm font-medium text-gray-700 mb-2">URL Link</label>
                    <input type="url" id="linkUrl" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors" placeholder="https://contoh.com" required>
                </div>
                <div class="mb-6">
                    <label for="category" class="block text-sm font-medium text-gray-700 mb-2">Kategori</label>
                    <input type="text" id="category" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors">
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white font-semibold py-3 rounded-lg hover:bg-blue-700 transition-colors flex items-center justify-center">
                    <i class="fas fa-save mr-2"></i> Simpan
                </button>
            </form>
            <div id="notification" class="mt-4 text-center text-sm font-medium transition-opacity duration-300 opacity-0"></div>
        </div>

        <!-- Tab 2: Enkripsi File -->
        <div id="tab2-content" class="tab-content tab-hidden">

            <!-- File Input -->
            <div class="mb-4">
                <label for="fileInput" class="block text-sm font-medium text-gray-700 mb-2">Pilih gambar atau video</label>
                <input id="fileInput" type="file" class="w-full px-2 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors" accept="image/*,video/*">
            </div>

            <!-- AES Key -->
            <div class="mb-4">
                <label for="aesKey" class="block text-sm font-medium text-gray-700 mb-2">
                    <i class="fas fa-key mr-1 text-yellow-500"></i> Kunci AES (password enkripsi)
                </label>
                <input id="aesKey" type="password" placeholder="Masukkan kunci rahasia..."
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-yellow-400 transition-colors">
                <p class="text-xs text-gray-400 mt-1">Simpan kunci ini. Diperlukan untuk dekripsi.</p>
            </div>

            <!-- Output filename -->
            <div class="mb-4">
                <label for="filenameDisplay" class="block text-sm font-medium text-gray-700 mb-2">Nama file hasil (.pb)</label>
                <input id="filenameDisplay" type="text" readonly class="w-full px-4 py-3 border border-gray-300 rounded-lg bg-gray-100 cursor-not-allowed">
            </div>

            <!-- GitHub Repo Section -->
            <div class="border border-gray-200 rounded-lg p-4 mb-4 bg-white">
                <div class="flex items-center justify-between mb-3">
                    <span class="text-sm font-semibold text-gray-700"><i class="fab fa-github mr-2"></i>Upload ke GitHub</span>
                    <button id="loadReposBtn" class="text-xs bg-gray-800 text-white px-3 py-1 rounded-full hover:bg-gray-700 transition-colors">
                        <i class="fas fa-sync-alt mr-1"></i> Muat Repo
                    </button>
                </div>

                <!-- Repo List -->
                <div id="repoList" class="max-h-36 overflow-y-auto border border-gray-200 rounded-lg mb-3 hidden">
                    <!-- repos populated here -->
                </div>

                <!-- Selected repo display -->
                <div id="selectedRepoDisplay" class="hidden mb-3">
                    <span class="text-xs text-gray-500">Repo dipilih:</span>
                    <span id="selectedRepoName" class="ml-1 text-sm font-semibold text-blue-600"></span>
                </div>

                <!-- Create new repo -->
                <div class="flex gap-2">
                    <input id="newRepoName" type="text" placeholder="Nama repo baru..."
                        class="flex-1 px-3 py-2 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-gray-400">
                    <button id="createRepoBtn" class="text-xs bg-gray-800 text-white px-3 py-2 rounded-lg hover:bg-gray-700 transition-colors whitespace-nowrap">
                        <i class="fas fa-plus mr-1"></i> Buat Repo
                    </button>
                </div>
            </div>

            <!-- Progress -->
            <div id="progressContainer" class="hidden mb-4">
                <div class="flex justify-between text-xs text-gray-500 mb-1">
                    <span id="progressLabel">Mengenkripsi...</span>
                    <span id="progressPercent">0%</span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-2">
                    <div id="progress-bar" class="bg-blue-500 h-2 rounded-full" style="width:0%"></div>
                </div>
            </div>

            <!-- Encrypt Button -->
            <button id="encryptBtn" class="w-full bg-green-600 text-white font-semibold py-3 rounded-lg hover:bg-green-700 transition-colors flex items-center justify-center mt-2">
                <i class="fas fa-lock mr-2"></i> Enkripsi & Upload ke GitHub
            </button>

            <p class="text-xs text-gray-400 mt-4 text-center">Teknik: File &rarr; Base64 &rarr; <strong>AES-256</strong> &rarr; Upload GitHub &rarr; Raw URL otomatis ke Tab 1</p>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal-container" class="fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full flex items-center justify-center">
        <div class="bg-white p-6 rounded-lg shadow-xl text-center max-w-sm w-full mx-4">
            <p id="modal-title" class="text-lg font-bold mb-3"></p>
            <p id="modal-message" class="text-sm text-gray-600 whitespace-pre-wrap break-all"></p>
            <button id="modal-close-btn" class="mt-5 px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Tutup</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ─── CONFIG ─────────────────────────────────────────────────────────────
        const SUPABASE_URL = 'https://qzdvdfebkzlwkhvxwsju.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF6ZHZkZmVia3psd2todnh3c2p1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzcyMTA4OTksImV4cCI6MjA1Mjc4Njg5OX0.Z9XKmX49vu0kZwn6YMom8QeLNNdKQMXCIkxcIoHKQFs';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const GITHUB_TOKEN = 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';
        const GITHUB_API = 'https://api.github.com';

        // ─── UI ELEMENTS ─────────────────────────────────────────────────────────
        const tab1Btn = document.getElementById('tab1-btn');
        const tab2Btn = document.getElementById('tab2-btn');
        const tab1Content = document.getElementById('tab1-content');
        const tab2Content = document.getElementById('tab2-content');
        const form = document.getElementById('singleAddForm');
        const notification = document.getElementById('notification');
        const fileInput = document.getElementById('fileInput');
        const aesKey = document.getElementById('aesKey');
        const filenameDisplay = document.getElementById('filenameDisplay');
        const encryptBtn = document.getElementById('encryptBtn');
        const modalContainer = document.getElementById('modal-container');
        const modalTitle = document.getElementById('modal-title');
        const modalMessage = document.getElementById('modal-message');
        const modalCloseBtn = document.getElementById('modal-close-btn');
        const loadReposBtn = document.getElementById('loadReposBtn');
        const repoList = document.getElementById('repoList');
        const createRepoBtn = document.getElementById('createRepoBtn');
        const newRepoName = document.getElementById('newRepoName');
        const selectedRepoDisplay = document.getElementById('selectedRepoDisplay');
        const selectedRepoNameEl = document.getElementById('selectedRepoName');
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progress-bar');
        const progressLabel = document.getElementById('progressLabel');
        const progressPercent = document.getElementById('progressPercent');

        let selectedRepo = null; // { full_name, name, owner }
        let ghUsername = null;

        // ─── MODAL ────────────────────────────────────────────────────────────────
        function showModal(title, message) {
            modalTitle.textContent = title;
            modalMessage.textContent = message;
            modalContainer.classList.add('show');
        }
        modalCloseBtn.addEventListener('click', () => modalContainer.classList.remove('show'));

        // ─── TABS ─────────────────────────────────────────────────────────────────
        function switchTab(n) {
            tab1Btn.classList.remove('border-blue-500', 'text-blue-600');
            tab2Btn.classList.remove('border-blue-500', 'text-blue-600');
            tab1Content.classList.add('tab-hidden');
            tab2Content.classList.add('tab-hidden');
            if (n === 1) {
                tab1Btn.classList.add('border-blue-500', 'text-blue-600');
                setTimeout(() => tab1Content.classList.remove('tab-hidden'), 50);
            } else {
                tab2Btn.classList.add('border-blue-500', 'text-blue-600');
                setTimeout(() => tab2Content.classList.remove('tab-hidden'), 50);
            }
        }
        tab1Btn.classList.add('border-blue-500', 'text-blue-600');
        tab1Btn.addEventListener('click', () => switchTab(1));
        tab2Btn.addEventListener('click', () => switchTab(2));

        // ─── TAB 1: SIMPAN KE SUPABASE ────────────────────────────────────────────
        function showNotification(msg, isError = false) {
            notification.textContent = msg;
            notification.style.opacity = 1;
            notification.classList.toggle('text-red-500', isError);
            notification.classList.toggle('text-green-500', !isError);
            setTimeout(() => { notification.style.opacity = 0; }, 3500);
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const personName = document.getElementById('personName').value.trim();
            const linkName = document.getElementById('linkName').value.trim();
            const linkUrl = document.getElementById('linkUrl').value.trim();
            const category = document.getElementById('category').value.trim();

            if (!personName || !linkName || !linkUrl) {
                showNotification('Semua field wajib diisi.', true);
                return;
            }
            const submitBtn = form.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Memproses...';

            const { error } = await supabaseClient.from('links').insert([
                { person_name: personName, name: linkName, url: linkUrl, category: category }
            ]);

            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i class="fas fa-save mr-2"></i> Simpan';

            if (error) {
                console.error(error);
                showNotification('Gagal menyimpan konten.', true);
            } else {
                showNotification('Konten berhasil ditambahkan.');
                form.reset();
            }
        });

        // ─── GITHUB HELPERS ──────────────────────────────────────────────────────
        async function ghFetch(path, options = {}) {
            const res = await fetch(`${GITHUB_API}${path}`, {
                ...options,
                headers: {
                    'Authorization': `token ${GITHUB_TOKEN}`,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json',
                    ...(options.headers || {})
                }
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.message || `GitHub error ${res.status}`);
            return data;
        }

        async function getGhUser() {
            if (ghUsername) return ghUsername;
            const user = await ghFetch('/user');
            ghUsername = user.login;
            return ghUsername;
        }

        // ─── LOAD REPOS ──────────────────────────────────────────────────────────
        loadReposBtn.addEventListener('click', async () => {
            loadReposBtn.disabled = true;
            loadReposBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-1"></i> Memuat...';
            try {
                const repos = await ghFetch('/user/repos?per_page=100&sort=updated');
                repoList.innerHTML = '';
                if (repos.length === 0) {
                    repoList.innerHTML = '<p class="text-xs text-gray-400 p-3">Belum ada repo.</p>';
                } else {
                    repos.forEach(r => {
                        const div = document.createElement('div');
                        div.className = 'repo-item border-b border-gray-100 px-3 py-2 flex items-center gap-2';
                        div.innerHTML = `<i class="fab fa-github text-gray-400 text-xs"></i><span class="text-sm text-gray-700">${r.full_name}</span>`;
                        div.addEventListener('click', () => {
                            document.querySelectorAll('.repo-item').forEach(el => el.classList.remove('selected'));
                            div.classList.add('selected');
                            selectedRepo = { full_name: r.full_name, name: r.name, owner: r.owner.login };
                            selectedRepoNameEl.textContent = r.full_name;
                            selectedRepoDisplay.classList.remove('hidden');
                        });
                        repoList.appendChild(div);
                    });
                }
                repoList.classList.remove('hidden');
            } catch (err) {
                showModal('Gagal', 'Tidak bisa memuat repo: ' + err.message);
            }
            loadReposBtn.disabled = false;
            loadReposBtn.innerHTML = '<i class="fas fa-sync-alt mr-1"></i> Muat Repo';
        });

        // ─── CREATE REPO ─────────────────────────────────────────────────────────
        createRepoBtn.addEventListener('click', async () => {
            const name = newRepoName.value.trim().replace(/\s+/g, '-');
            if (!name) { showModal('Peringatan', 'Masukkan nama repo terlebih dahulu.'); return; }
            createRepoBtn.disabled = true;
            createRepoBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-1"></i>';
            try {
                const repo = await ghFetch('/user/repos', {
                    method: 'POST',
                    body: JSON.stringify({ name, private: false, auto_init: true })
                });
                selectedRepo = { full_name: repo.full_name, name: repo.name, owner: repo.owner.login };
                selectedRepoNameEl.textContent = repo.full_name;
                selectedRepoDisplay.classList.remove('hidden');
                newRepoName.value = '';
                showModal('Berhasil', `Repo "${repo.full_name}" berhasil dibuat dan dipilih.`);
            } catch (err) {
                showModal('Gagal', 'Gagal membuat repo: ' + err.message);
            }
            createRepoBtn.disabled = false;
            createRepoBtn.innerHTML = '<i class="fas fa-plus mr-1"></i> Buat Repo';
        });

        // ─── SET PROGRESS ─────────────────────────────────────────────────────────
        function setProgress(label, pct) {
            progressContainer.classList.remove('hidden');
            progressLabel.textContent = label;
            progressPercent.textContent = pct + '%';
            progressBar.style.width = pct + '%';
        }
        function hideProgress() { progressContainer.classList.add('hidden'); }

        // ─── BASE64 SAFE ENCODER FOR GITHUB ──────────────────────────────────────
        function toGitHubBase64(str) {
            const bytes = new TextEncoder().encode(str);
            let binary = '';
            const chunkSize = 8192;
            for (let i = 0; i < bytes.length; i += chunkSize) {
                const chunk = bytes.subarray(i, i + chunkSize);
                binary += String.fromCharCode(...chunk);
            }
            return btoa(binary);
        }

        // ─── AES ENCRYPT ─────────────────────────────────────────────────────────
        function aesEncrypt(base64Data, key) {
            return CryptoJS.AES.encrypt(base64Data, key).toString();
        }

        // ─── ENCRYPT & UPLOAD ─────────────────────────────────────────────────────
        encryptBtn.addEventListener('click', async function () {
            const key = aesKey.value.trim();
            if (!key) { showModal('Peringatan', 'Masukkan kunci AES terlebih dahulu.'); return; }
            if (!fileInput.files || fileInput.files.length === 0) { showModal('Peringatan', 'Pilih file gambar atau video terlebih dahulu.'); return; }
            if (!selectedRepo) { showModal('Peringatan', 'Pilih atau buat repo GitHub terlebih dahulu.'); return; }

            encryptBtn.disabled = true;
            encryptBtn.innerHTML = '<i class="fas fa-sync-alt fa-spin mr-2"></i> Memproses...';
            setProgress('Membaca file...', 10);

            const file = fileInput.files[0];
            const randomId = crypto.randomUUID().split('-')[0];
            const newFilename = `${randomId}.pb`;
            filenameDisplay.value = newFilename;

            const reader = new FileReader();

            reader.onload = async function (e) {
                try {
                    setProgress('Mengenkripsi dengan AES...', 35);

                    // AES encrypt the base64 data URL
                    const encrypted = aesEncrypt(e.target.result, key);

                    setProgress('Mengunggah ke GitHub...', 60);

                    // Safely encode for GitHub API
                    const contentBase64 = toGitHubBase64(encrypted);

                    const owner = selectedRepo.owner;
                    const repo = selectedRepo.name;

                    // Check if file exists (for SHA, required for update)
                    let sha = undefined;
                    try {
                        const existing = await ghFetch(`/repos/${owner}/${repo}/contents/${newFilename}`);
                        sha = existing.sha;
                    } catch (_) { /* new file, no sha needed */ }

                    const body = {
                        message: `Upload encrypted file ${newFilename}`,
                        content: contentBase64
                    };
                    if (sha) body.sha = sha;

                    await ghFetch(`/repos/${owner}/${repo}/contents/${newFilename}`, {
                        method: 'PUT',
                        body: JSON.stringify(body)
                    });

                    setProgress('Mengambil raw URL...', 85);

                    // Build raw URL
                    const rawUrl = `https://raw.githubusercontent.com/${owner}/${repo}/main/${newFilename}`;

                    setProgress('Selesai!', 100);

                    // Auto-fill Tab 1 URL Link
                    document.getElementById('linkUrl').value = rawUrl;

                    // Switch to Tab 1
                    switchTab(1);

                    setTimeout(hideProgress, 800);
                    encryptBtn.disabled = false;
                    encryptBtn.innerHTML = '<i class="fas fa-lock mr-2"></i> Enkripsi & Upload ke GitHub';

                    showModal('Berhasil! 🎉', `File terenkripsi berhasil diunggah.\n\nFile: ${newFilename}\nRepo: ${selectedRepo.full_name}\n\nRaw URL sudah otomatis dimasukkan ke kolom URL Link di Tab Tambah Tautan.`);

                } catch (err) {
                    hideProgress();
                    encryptBtn.disabled = false;
                    encryptBtn.innerHTML = '<i class="fas fa-lock mr-2"></i> Enkripsi & Upload ke GitHub';
                    showModal('Gagal', 'Terjadi kesalahan: ' + err.message);
                }
            };

            reader.onerror = function () {
                hideProgress();
                encryptBtn.disabled = false;
                encryptBtn.innerHTML = '<i class="fas fa-lock mr-2"></i> Enkripsi & Upload ke GitHub';
                showModal('Gagal', 'Gagal membaca file. Coba ulangi.');
            };

            reader.readAsDataURL(file);
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dekripsi & Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.44.2/+esm';
    window.createClient = createClient;
  </script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0a0f;
      --surface:  #111118;
      --border:   rgba(255,255,255,.07);
      --border-h: rgba(255,255,255,.13);
      --text:     #e8e8f0;
      --muted:    #5a5a72;
      --accent:   #4f6ef7;
      --accent2:  #22d3a5;
      --accent3:  #a78bfa;
      --danger:   #ef4444;
      --font:     'DM Sans', sans-serif;
      --mono:     'DM Mono', monospace;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Subtle noise texture ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse 80vw 60vh at 10% 5%, rgba(79,110,247,.055) 0%, transparent 70%),
        radial-gradient(ellipse 60vw 50vh at 90% 90%, rgba(34,211,165,.04) 0%, transparent 70%);
    }

    /* ── Layout ── */
    .app {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 860px;
      width: 100%;
      margin: 0 auto;
      padding: 2rem 1.25rem 4rem;
    }
    @media (min-width: 768px) {
      .app { padding: 3rem 2rem 5rem; }
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2rem;
    }
    .header-icon {
      width: 2.25rem;
      height: 2.25rem;
      border-radius: .5rem;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      opacity: .9;
    }
    .header-title {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -.01em;
      color: var(--text);
    }
    .header-sub {
      font-size: .75rem;
      color: var(--muted);
      margin-top: .1rem;
    }

    /* ── Status ── */
    .status {
      display: flex;
      align-items: center;
      gap: .625rem;
      font-size: .8rem;
      color: var(--muted);
      font-family: var(--mono);
      padding: .75rem 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.75rem;
      transition: color .25s;
    }
    .status.ok  { color: var(--accent2); }
    .status.err { color: var(--danger); }
    .status-dot {
      width: .5rem;
      height: .5rem;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
      transition: background .25s;
    }
    .status.loading .status-dot {
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* ── Section label ── */
    .section-label {
      font-size: .7rem;
      font-weight: 500;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .875rem;
    }

    /* ── Preview area ── */
    .preview-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.75rem;
    }
    .preview-name {
      font-size: .875rem;
      color: var(--muted);
      font-family: var(--mono);
      text-align: center;
      word-break: break-word;
    }
    .preview-wrap img,
    .preview-wrap video {
      width: auto;
      max-width: 100%;
      max-height: 340px;
      border-radius: .75rem;
      border: 1px solid var(--border);
      object-fit: contain;
      display: block;
    }

    /* ── Divider ── */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.75rem 0;
    }

    /* ── Meta row ── */
    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: .625rem;
      margin-bottom: 1.5rem;
    }
    .meta-chip {
      display: inline-flex;
      align-items: center;
      gap: .375rem;
      font-family: var(--mono);
      font-size: .75rem;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: .375rem;
      padding: .375rem .75rem;
    }

    /* ── Buttons ── */
    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: .625rem;
      margin-bottom: 1.75rem;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      padding: .6rem 1.125rem;
      border-radius: .5rem;
      font-size: .8125rem;
      font-weight: 500;
      font-family: var(--font);
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: opacity .15s, transform .15s;
    }
    .btn:hover { opacity: .85; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); opacity: 1; }

    .btn-outline {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border-h);
    }
    .btn-outline:hover { color: var(--text); border-color: var(--border-h); }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-success {
      background: var(--accent2);
      color: #0a0a0f;
    }
    .btn-purple {
      background: var(--accent3);
      color: #0a0a0f;
    }

    /* ── Pre / text preview ── */
    pre.text-preview {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: .625rem;
      padding: 1rem;
      font-family: var(--mono);
      font-size: .75rem;
      color: var(--muted);
      max-height: 18rem;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-all;
      margin-bottom: 1.5rem;
    }

    /* ── QR section ── */
    .qr-block {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 1rem;
      padding: 1.25rem 0;
      border-top: 1px solid var(--border);
    }
    .qr-canvas-wrap {
      background: #fff;
      border-radius: .5rem;
      padding: .5rem;
      display: inline-block;
      cursor: pointer;
    }

    /* ── Related content ── */
    .related-block { padding-top: 1.5rem; border-top: 1px solid var(--border); }
    .category-group { margin-bottom: 1rem; }
    .category-heading {
      font-size: .7rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .5rem;
      font-weight: 500;
    }
    .related-sublist { list-style: none; display: flex; flex-direction: column; gap: .25rem; }
    .related-sublist li {
      font-size: .8125rem;
      color: var(--muted);
      padding: .5rem .75rem;
      border-radius: .375rem;
      cursor: pointer;
      transition: background .15s, color .15s;
      border: 1px solid transparent;
    }
    .related-sublist li:hover {
      background: var(--surface);
      color: var(--text);
      border-color: var(--border);
    }

    /* ── Frames ── */
    .frames-block { padding-top: 1.5rem; border-top: 1px solid var(--border); }
    .frames-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: .5rem;
      margin-bottom: .75rem;
    }
    .frames-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: .5rem;
      margin-top: .75rem;
    }
    @media (min-width: 600px) {
      .frames-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
    }
    .frame-thumb {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      border-radius: .5rem;
      cursor: pointer;
      border: 1px solid var(--border);
      transition: border-color .15s, transform .15s;
    }
    .frame-thumb:hover { border-color: var(--accent); transform: scale(1.03); }
    .frame-thumb.active-frame { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(79,110,247,.35); }

    .frame-badge {
      font-family: var(--mono);
      font-size: .7rem;
      color: var(--accent);
      padding: .3rem .625rem;
      background: rgba(79,110,247,.08);
      border: 1px solid rgba(79,110,247,.2);
      border-radius: .35rem;
    }

    /* ── Progress ── */
    .progress-wrap { width: 100%; max-width: 380px; margin: .75rem 0; }
    .progress-bg {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 0;
      background: var(--accent);
      border-radius: 2px;
      transition: width .1s ease;
    }
    .progress-text { font-family: var(--mono); font-size: .7rem; color: var(--muted); margin-top: .35rem; }

    /* ── Kbd hint ── */
    .kbd-hint {
      display: flex;
      align-items: center;
      gap: .375rem;
      font-size: .7rem;
      color: var(--muted);
      margin-bottom: .5rem;
    }
    .kbd {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 1.375rem;
      height: 1.375rem;
      padding: 0 .3rem;
      background: var(--surface);
      border: 1px solid var(--border-h);
      border-radius: .25rem;
      font-family: var(--mono);
      font-size: .65rem;
      color: var(--muted);
    }

    /* ── Locked Overlay ── */
    #lockedOverlay {
      position: fixed;
      inset: 0;
      background: rgba(10,10,15,.97);
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      backdrop-filter: blur(16px);
    }
    #lockedBox {
      text-align: center;
      max-width: 360px;
      width: 100%;
    }
    .locked-icon-ring {
      width: 5rem;
      height: 5rem;
      border-radius: 50%;
      border: 1px solid var(--border-h);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.75rem;
      background: var(--surface);
    }
    #lockedBox h2 {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: .625rem;
      letter-spacing: -.02em;
    }
    #lockedBox p {
      font-size: .875rem;
      color: var(--muted);
      line-height: 1.65;
    }

    body.blurred .app {
      filter: blur(6px) brightness(.5);
      pointer-events: none;
      user-select: none;
    }

    /* ── Image Modal ── */
    #imageModal {
      display: none;
      position: fixed;
      z-index: 2000;
      inset: 0;
      background: rgba(0,0,0,.96);
      align-items: center;
      justify-content: center;
      padding: 1rem;
      backdrop-filter: blur(12px);
      flex-direction: column;
      gap: .75rem;
    }
    .modal-img { max-width: 92%; max-height: 78vh; border-radius: .625rem; display: block; }
    .modal-close {
      position: absolute;
      top: 1rem;
      right: 1.25rem;
      width: 2rem;
      height: 2rem;
      border-radius: .375rem;
      border: 1px solid var(--border-h);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      font-size: 1.125rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color .15s, border-color .15s;
      line-height: 1;
      z-index: 10;
    }
    .modal-close:hover { color: var(--text); border-color: var(--border-h); }
    .modal-nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 2.5rem;
      height: 2.5rem;
      border-radius: .5rem;
      background: var(--surface);
      border: 1px solid var(--border-h);
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color .15s, border-color .15s;
      z-index: 10;
    }
    .modal-nav-btn:hover { color: var(--text); }
    .modal-nav-btn:disabled { opacity: .25; cursor: default; pointer-events: none; }
    .modal-nav-btn.prev { left: .75rem; }
    .modal-nav-btn.next { right: .75rem; }
    .modal-counter {
      position: absolute;
      top: 1rem;
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--mono);
      font-size: .75rem;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: .3rem .75rem;
      border-radius: 2rem;
      z-index: 10;
    }
    .modal-dl {
      position: absolute;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
    }

    /* ── Utils ── */
    .hidden { display: none !important; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    .fade-in { animation: fadeUp .35s ease both; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.08); border-radius: 3px; }
  </style>
</head>
<body>

  <div class="app">

    <!-- Header -->
    <div class="header fade-in">
      <div class="header-icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" width="16" height="16" style="color:#fff">
          <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 10.5V6.75a4.5 4.5 0 1 1 9 0v3.75M3.75 21.75h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H3.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z"/>
        </svg>
      </div>
      <div>
        <div class="header-title">Hasil Dekripsi</div>
        <div class="header-sub">Pratinjau konten yang telah terdekripsi</div>
      </div>
    </div>

    <!-- Status -->
    <div id="status" class="status loading fade-in" style="animation-delay:.04s">
      <span class="status-dot"></span>
      <span id="statusText">Memuat...</span>
    </div>

    <!-- Preview -->
    <div id="preview" class="preview-wrap fade-in" style="animation-delay:.08s"></div>

    <!-- Meta -->
    <div id="meta" class="meta-row hidden fade-in">
      <span class="meta-chip">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" width="12" height="12">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 7.5l-9-5.25L3 7.5m18 0l-9 5.25m9-5.25v9l-9 5.25M3 7.5l9 5.25M3 7.5v9l9 5.25m0-9v9"/>
        </svg>
        <span id="fileSize">-</span>
      </span>
      <span class="meta-chip">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" width="12" height="12">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a4.5 4.5 0 0 0-4.5-4.5Z"/>
        </svg>
        <span id="detectedMime">-</span>
      </span>
    </div>

    <!-- Download buttons -->
    <div class="btn-row">
      <a id="downloadOriginalBtn" class="btn btn-outline hidden">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" width="14" height="14">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3"/>
        </svg>
        Unduh .pb
      </a>
      <a id="downloadDecryptedBtn" class="btn btn-success hidden">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" width="14" height="14">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3"/>
        </svg>
        Unduh Dekripsi
      </a>
    </div>

    <!-- Video actions -->
    <div id="videoActions" class="btn-row hidden">
      <button id="showFramesBtn" class="btn btn-purple">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" width="14" height="14">
          <path stroke-linecap="round" stroke-linejoin="round" d="m2.25 15.75 5.159-5.159a2.25 2.25 0 0 1 3.182 0l5.159 5.159m-1.5-1.5 1.409-1.409a2.25 2.25 0 0 1 3.182 0l2.909 2.909M3.75 21h16.5A2.25 2.25 0 0 0 22.5 18.75V5.25A2.25 2.25 0 0 0 20.25 3H3.75A2.25 2.25 0 0 0 1.5 5.25v13.5A2.25 2.25 0 0 0 3.75 21Z"/>
        </svg>
        Tampilkan Semua Frame
      </button>
    </div>

    <!-- QR section -->
    <div id="qrSection" class="qr-block hidden fade-in">
      <div class="section-label">QR Code Akses Cepat</div>
      <div id="qrWrapper" class="qr-canvas-wrap">
        <canvas id="qrCanvas"></canvas>
      </div>
      <div class="btn-row" style="margin-bottom:0">
        <button id="downloadQrBtn" class="btn btn-outline">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" width="14" height="14">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3"/>
          </svg>
          Unduh QR
        </button>
      </div>
    </div>

    <!-- Frames section -->
    <div id="framesPreview" class="frames-block hidden fade-in">
      <div class="frames-header">
        <div class="section-label" style="margin-bottom:0">Frame Video</div>
        <span id="frameCounterBadge" class="frame-badge hidden"><span id="frameCountText">0 frame</span></span>
      </div>
      <div id="progressWrap" class="progress-wrap hidden">
        <div class="progress-bg"><div id="progressFill" class="progress-fill"></div></div>
        <div id="progressText" class="progress-text">Mengekstrak frame...</div>
      </div>
      <div class="kbd-hint">
        <span>Navigasi frame:</span>
        <span class="kbd">←</span>
        <span class="kbd">→</span>
      </div>
      <div class="frames-grid" id="framesGrid"></div>
    </div>

    <!-- Related section -->
    <div id="relatedSection" class="related-block hidden fade-in">
      <div class="section-label">Konten Terkait</div>
      <div id="relatedList"></div>
    </div>

  </div>

  <!-- Locked Overlay -->
  <div id="lockedOverlay" role="dialog" aria-modal="true">
    <div id="lockedBox">
      <div class="locked-icon-ring">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="28" height="28" style="color:var(--muted)">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z"/>
        </svg>
      </div>
      <h2>Akses Terkunci</h2>
      <p>Login terlebih dahulu untuk melihat konten ini.</p>
    </div>
  </div>

  <!-- Image Modal -->
  <div id="imageModal">
    <button class="modal-close" id="modalCloseBtn">&times;</button>
    <div class="modal-counter hidden" id="modalCounter">1 / 1</div>
    <button class="modal-nav-btn prev hidden" id="modalPrev" aria-label="Sebelumnya">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" width="16" height="16">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5"/>
      </svg>
    </button>
    <button class="modal-nav-btn next hidden" id="modalNext" aria-label="Berikutnya">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" width="16" height="16">

    function decryptCaesar(text,shift){
      if(typeof text!=='string')return text;
      const s=Number(shift);if(isNaN(s))return text;
      let r='';
      for(let i=0;i<text.length;i++){
        let c=text.charCodeAt(i);
        if(c>=65&&c<=90)c=((c-65-s+260)%26)+65;
        else if(c>=97&&c<=122)c=((c-97-s+260)%26)+97;
        r+=String.fromCharCode(c);
      }
      return r;
    }

    /* Pure-JS MD5 */
    function md5js(dataBytes){
      function RL(v,n){return(v<<n)|(v>>>(32-n));}
      function ADD(x,y){return(x+y)|0;}
      const K=new Int32Array(64);
      for(let i=0;i<64;i++)K[i]=Math.floor(Math.abs(Math.sin(i+1))*0x100000000)|0;
      const S=[7,12,17,22,7,12,17,22,7,12,17,22,7,12,17,22,
               5, 9,14,20,5, 9,14,20,5, 9,14,20,5, 9,14,20,
               4,11,16,23,4,11,16,23,4,11,16,23,4,11,16,23,
               6,10,15,21,6,10,15,21,6,10,15,21,6,10,15,21];
      const bytes=Array.from(dataBytes);
      const bitLen=bytes.length*8;
      bytes.push(0x80);
      while(bytes.length%64!==56)bytes.push(0);
      for(let i=0;i<4;i++)bytes.push((bitLen>>>(i*8))&0xFF);
      for(let i=0;i<4;i++)bytes.push(0);
      let a0=0x67452301,b0=0xEFCDAB89|0,c0=0x98BADCFE|0,d0=0x10325476|0;
      for(let blk=0;blk<bytes.length;blk+=64){
        const W=new Int32Array(16);
        for(let j=0;j<16;j++){const o=blk+j*4;W[j]=bytes[o]|(bytes[o+1]<<8)|(bytes[o+2]<<16)|(bytes[o+3]<<24);}
        let A=a0,B=b0,C=c0,D=d0;
        for(let i=0;i<64;i++){
          let F2,g;
          if(i<16){F2=(B&C)|(~B&D);g=i;}
          else if(i<32){F2=(D&B)|(~D&C);g=(5*i+1)%16;}
          else if(i<48){F2=B^C^D;g=(3*i+5)%16;}
          else{F2=C^(B|~D);g=(7*i)%16;}
          F2=ADD(F2,ADD(A,ADD(K[i],W[g])));
          A=D;D=C;C=B;B=ADD(B,RL(F2,S[i]));
        }
        a0=ADD(a0,A);b0=ADD(b0,B);c0=ADD(c0,C);d0=ADD(d0,D);
      }
      const out=new Uint8Array(16);
      [a0,b0,c0,d0].forEach((v,i)=>{out[i*4]=(v)&0xFF;out[i*4+1]=(v>>>8)&0xFF;out[i*4+2]=(v>>>16)&0xFF;out[i*4+3]=(v>>>24)&0xFF;});
      return out;
    }

    function evpBytesToKey(password,salt,keyLen){
      let result=new Uint8Array(0),prev=new Uint8Array(0);
      while(result.length<keyLen){
        const input=new Uint8Array(prev.length+password.length+salt.length);
        input.set(prev,0);input.set(password,prev.length);input.set(salt,prev.length+password.length);
        prev=md5js(input);
        const tmp=new Uint8Array(result.length+prev.length);
        tmp.set(result,0);tmp.set(prev,result.length);result=tmp;
      }
      return result.slice(0,keyLen);
    }

    function normalizeBase64(b64){
      if(!b64||typeof b64!=='string')return'';
      let s=b64.replace(/\s+/g,'');
      const m=s.match(/^data:.*;base64,(.*)$/i);
      if(m)s=m[1];
      s=s.replace(/-/g,'+').replace(/_/g,'/');
      const pad=s.length%4;
      if(pad===2)s+='==';else if(pad===3)s+='=';
      return s;
    }

    function base64ToBlob(base64,mime){
      const cleaned=normalizeBase64(base64);
      const binary=atob(cleaned);
      const arr=new Uint8Array(binary.length);
      for(let i=0;i<binary.length;i++)arr[i]=binary.charCodeAt(i);
      return new Blob([arr],{type:mime||'application/octet-stream'});
    }

    function detectMimeFromBase64(b64){
      try{
        const cleaned=normalizeBase64(b64).slice(0,2000);
        if(!cleaned)return null;
        const bin=atob(cleaned.slice(0,1000));
        if(bin.startsWith('\x89PNG'))return'image/png';
        if(bin.charCodeAt(0)===0xFF&&bin.charCodeAt(1)===0xD8)return'image/jpeg';
        if(bin.startsWith('GIF87a')||bin.startsWith('GIF89a'))return'image/gif';
        if(bin.indexOf('ftyp')!==-1)return'video/mp4';
        if(bin.toLowerCase().indexOf('webm')!==-1)return'video/webm';
        if(cleaned.startsWith('iVBOR'))return'image/png';
        if(cleaned.startsWith('/9j/'))return'image/jpeg';
        return null;
      }catch(e){return null;}
    }

    function bytesToMB(n){
      if(typeof n!=='number'||isNaN(n))return'-';
      if(n<1024*1024)return(n/1024).toFixed(1)+' KB';
      return(n/(1024*1024)).toFixed(2)+' MB';
    }

    async function decryptAES(encryptedText,password){
      const b64=encryptedText.replace(/\s+/g,'');
      let raw;
      try{raw=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));}
      catch(e){throw new Error('Base64 tidak valid: '+e.message);}
      let key,iv,ciphertext;
      const passBytes=new TextEncoder().encode(password);
      const header=String.fromCharCode(...raw.slice(0,8));
      if(header==='Salted__'){
        const salt=raw.slice(8,16);ciphertext=raw.slice(16);
        const keyiv=evpBytesToKey(passBytes,salt,48);
        key=keyiv.slice(0,32);iv=keyiv.slice(32,48);
      }else{
        iv=raw.slice(0,16);ciphertext=raw.slice(16);
        const keyiv=evpBytesToKey(passBytes,new Uint8Array(8),32);
        key=keyiv.slice(0,32);
      }
      const cryptoKey=await crypto.subtle.importKey('raw',key,{name:'AES-CBC'},false,['decrypt']);
      let decrypted;
      try{decrypted=await crypto.subtle.decrypt({name:'AES-CBC',iv},cryptoKey,ciphertext);}
      catch(e){throw new Error('Kunci/IV salah atau data rusak');}
      return new Uint8Array(decrypted);
    }

    /* ── Modal state ── */
    const modal=document.getElementById('imageModal');
    const modalImage=document.getElementById('modalImage');
    const modalDownloadBtn=document.getElementById('modalDownloadBtn');
    const modalPrev=document.getElementById('modalPrev');
    const modalNext=document.getElementById('modalNext');
    const modalCounter=document.getElementById('modalCounter');
    let frameImages=[];
    let currentFrameIndex=-1;
    let isFrameMode=false;

    function openModalSingle(src,filename){
      isFrameMode=false;currentFrameIndex=-1;
      modal.style.display='flex';
      modalImage.src=src;
      modalDownloadBtn.href=src;
      modalDownloadBtn.download=filename||'image.png';
      modalPrev.classList.add('hidden');
      modalNext.classList.add('hidden');
      modalCounter.classList.add('hidden');
    }

    function openModalFrame(index){
      if(!frameImages.length)return;
      isFrameMode=true;
      currentFrameIndex=Math.max(0,Math.min(index,frameImages.length-1));
      modal.style.display='flex';
      modalPrev.classList.remove('hidden');
      modalNext.classList.remove('hidden');
      modalCounter.classList.remove('hidden');
      updateModalFrame();
    }

    function updateModalFrame(){
      const f=frameImages[currentFrameIndex];if(!f)return;
      modalImage.src=f.src;
      modalDownloadBtn.href=f.src;
      modalDownloadBtn.download=f.filename;
      modalCounter.textContent=`${currentFrameIndex+1} / ${frameImages.length}`;
      modalPrev.disabled=currentFrameIndex<=0;
      modalNext.disabled=currentFrameIndex>=frameImages.length-1;
      document.querySelectorAll('.frame-thumb').forEach((t,i)=>t.classList.toggle('active-frame',i===currentFrameIndex));
      const at=document.querySelectorAll('.frame-thumb')[currentFrameIndex];
      if(at)at.scrollIntoView({behavior:'smooth',block:'nearest',inline:'nearest'});
    }

    function navigateFrame(dir){
      if(!isFrameMode)return;
      const n=currentFrameIndex+dir;
      if(n<0||n>=frameImages.length)return;
      currentFrameIndex=n;updateModalFrame();
    }

    function closeModal(){
      modal.style.display='none';isFrameMode=false;currentFrameIndex=-1;
      document.querySelectorAll('.frame-thumb').forEach(t=>t.classList.remove('active-frame'));
    }

    document.getElementById('modalCloseBtn').addEventListener('click',closeModal);
    modal.addEventListener('click',e=>{if(e.target===modal)closeModal();});
    modalPrev.addEventListener('click',()=>navigateFrame(-1));
    modalNext.addEventListener('click',()=>navigateFrame(1));

    document.addEventListener('keydown',e=>{
      if(modal.style.display==='flex'){
        if(e.key==='Escape')closeModal();
        if(isFrameMode){
          if(e.key==='ArrowLeft'||e.key==='a'){e.preventDefault();navigateFrame(-1);}
          if(e.key==='ArrowRight'||e.key==='d'){e.preventDefault();navigateFrame(1);}
        }
      }
    });

    let touchStartX=0;
    modal.addEventListener('touchstart',e=>{touchStartX=e.changedTouches[0].clientX;},{passive:true});
    modal.addEventListener('touchend',e=>{
      if(!isFrameMode)return;
      const diff=e.changedTouches[0].clientX-touchStartX;
      if(Math.abs(diff)>50){if(diff<0)navigateFrame(1);else navigateFrame(-1);}
    },{passive:true});

    /* ── QR helper ── */
    async function generateQrCodeWithPadding(data,size=200,padding=10){
      const tempCanvas=document.createElement('canvas');
      await QRCode.toCanvas(tempCanvas,data,{errorCorrectionLevel:'H',margin:0,width:size});
      const qrSize=tempCanvas.width;
      const totalSize=qrSize+padding*2;
      const finalCanvas=document.createElement('canvas');
      finalCanvas.width=totalSize;finalCanvas.height=totalSize;
      const ctx=finalCanvas.getContext('2d');
      ctx.fillStyle='#FFFFFF';ctx.fillRect(0,0,totalSize,totalSize);
      ctx.drawImage(tempCanvas,padding,padding,qrSize,qrSize);
      return finalCanvas;
    }

    /* ── Main decrypt ── */
    async function loadAndDecrypt(url,shift,person,name){
      const previewEl=document.getElementById('preview');
      const metaEl=document.getElementById('meta');
      const fileSizeEl=document.getElementById('fileSize');
      const mimeEl=document.getElementById('detectedMime');
      const downloadOriginalBtn=document.getElementById('downloadOriginalBtn');
      const downloadDecryptedBtn=document.getElementById('downloadDecryptedBtn');
      const showFramesBtn=document.getElementById('showFramesBtn');
      const framesPreview=document.getElementById('framesPreview');
      const framesGrid=document.getElementById('framesGrid');
      const videoActions=document.getElementById('videoActions');
      const progressWrap=document.getElementById('progressWrap');
      const progressFill=document.getElementById('progressFill');
      const progressTextEl=document.getElementById('progressText');
      const frameCounterBadge=document.getElementById('frameCounterBadge');
      const frameCountText=document.getElementById('frameCountText');

      let objectUrl=null,currentBlob=null,detectedMime=null,videoEl=null,imageEl=null,decryptedContent='';

      if(!url){setStatus('Parameter url tidak ditemukan.','err');return;}

      setStatus('Memuat file terenkripsi...','loading');

      try{
        const res=await fetch(url);
        if(!res.ok)throw new Error(`Gagal memuat file: ${res.status}`);
        const encryptedText=await res.text();

        setStatus('Mendekripsi konten...','loading');

        const useAES=!shift||shift===''||shift==='-';
        let cleaned='';

        if(useAES){
          const AES_PASSWORD='dakota775';
          let decryptedBytes;
          try{decryptedBytes=await decryptAES(encryptedText.trim(),AES_PASSWORD);}
          catch(e){throw new Error('Dekripsi AES gagal: '+e.message);}
          const magic=decryptedBytes.slice(0,12);
          const isPNG=magic[0]===0x89&&magic[1]===0x50;
          const isJPEG=magic[0]===0xFF&&magic[1]===0xD8;
          const isGIF=magic[0]===0x47&&magic[1]===0x49;
          const isMP4=magic[4]===0x66&&magic[5]===0x74&&magic[6]===0x79&&magic[7]===0x70;
          const isWEBM=magic[0]===0x1A&&magic[1]===0x45;
          if(isPNG||isJPEG||isGIF||isMP4||isWEBM){
            if(isPNG)detectedMime='image/png';
            else if(isJPEG)detectedMime='image/jpeg';
            else if(isGIF)detectedMime='image/gif';
            else if(isMP4)detectedMime='video/mp4';
            else if(isWEBM)detectedMime='video/webm';
            currentBlob=new Blob([decryptedBytes],{type:detectedMime});
            objectUrl=URL.createObjectURL(currentBlob);
            fileSizeEl.textContent=bytesToMB(currentBlob.size);
            mimeEl.textContent=detectedMime;
            metaEl.classList.remove('hidden');
          }else{
            decryptedContent=new TextDecoder().decode(decryptedBytes);
            cleaned=normalizeBase64(decryptedContent.trim());
          }
        }else{
          decryptedContent=decryptCaesar(encryptedText,shift);
          cleaned=normalizeBase64(decryptedContent.trim());
        }

        const looksLikeBase64=!objectUrl&&cleaned&&/^[A-Za-z0-9+/=]+$/.test(cleaned);

        if(objectUrl||looksLikeBase64){
          if(!objectUrl){
            detectedMime=detectMimeFromBase64(cleaned)||'';
            currentBlob=base64ToBlob(cleaned,detectedMime);
            objectUrl=URL.createObjectURL(currentBlob);
            fileSizeEl.textContent=bytesToMB(currentBlob.size);
            mimeEl.textContent=detectedMime||'Tidak terdeteksi';
            metaEl.classList.remove('hidden');
          }

          if(detectedMime.startsWith('video/')){
            previewEl.innerHTML='';
            videoEl=document.createElement('video');
            videoEl.controls=true;videoEl.playsInline=true;
            videoEl.src=objectUrl;videoEl.loop=true;
            videoEl.style.cssText='width:100%;max-width:720px;border-radius:.75rem;border:1px solid var(--border);';
            const lbl=document.createElement('div');
            lbl.className='preview-name';
            lbl.textContent=`${person} — ${name}`;
            previewEl.appendChild(lbl);
            previewEl.appendChild(videoEl);
            videoActions.classList.remove('hidden');

            showFramesBtn.addEventListener('click',async()=>{
              if(framesGrid.innerHTML)return;
              framesPreview.classList.remove('hidden');
              progressWrap.classList.remove('hidden');
              showFramesBtn.disabled=true;showFramesBtn.style.opacity='.4';
              const canvas=document.createElement('canvas');
              const ctx=canvas.getContext('2d');
              await new Promise(resolve=>{
                if(videoEl.readyState>=1)resolve();
                else videoEl.addEventListener('loadedmetadata',resolve,{once:true});
              });
              canvas.width=videoEl.videoWidth;canvas.height=videoEl.videoHeight;
              const duration=videoEl.duration;
              const fps=Math.min(30,Math.ceil(duration*2));
              const totalFrames=Math.min(Math.floor(duration*fps),300);
              const frameInterval=duration/totalFrames;
              frameImages=[];
              for(let i=0;i<totalFrames;i++){
                videoEl.currentTime=i*frameInterval;
                await new Promise(resolve=>videoEl.addEventListener('seeked',resolve,{once:true}));
                ctx.drawImage(videoEl,0,0,canvas.width,canvas.height);
                const dataUrl=canvas.toDataURL('image/jpeg',.85);
                const filename=`frame_${String(i+1).padStart(4,'0')}.jpg`;
                frameImages.push({src:dataUrl,filename});
                const img=document.createElement('img');
                img.src=dataUrl;img.className='frame-thumb fade-in';img.alt=`Frame ${i+1}`;
                img.style.animationDelay=`${(i%12)*.03}s`;
                const idx=i;
                img.addEventListener('click',()=>openModalFrame(idx));
                framesGrid.appendChild(img);
                const pct=Math.round(((i+1)/totalFrames)*100);
                progressFill.style.width=pct+'%';
                progressTextEl.textContent=`Frame ${i+1} dari ${totalFrames} (${pct}%)`;
              }
              progressWrap.classList.add('hidden');
              frameCounterBadge.classList.remove('hidden');
              frameCountText.textContent=`${frameImages.length} frame`;
              setStatus(`Selesai — ${frameImages.length} frame diekstrak.`,'ok');
            });

          }else if(detectedMime.startsWith('image/')){
            previewEl.innerHTML='';
            imageEl=document.createElement('img');
            imageEl.src=objectUrl;imageEl.alt=`${person} — ${name}`;
            imageEl.style.cursor='pointer';
            imageEl.addEventListener('click',()=>openModalSingle(objectUrl,name||'image'));
            const lbl=document.createElement('div');
            lbl.className='preview-name';lbl.textContent=`${person} — ${name}`;
            previewEl.appendChild(lbl);
            previewEl.appendChild(imageEl);
          }else{
            previewEl.innerHTML='';
            const lbl=document.createElement('div');
            lbl.className='preview-name';lbl.textContent=`${person} — ${name}`;
            previewEl.appendChild(lbl);
            const pre=document.createElement('pre');
            pre.className='text-preview';
            pre.textContent=`[Preview base64 (dipotong)]\n${cleaned.slice(0,1500)}${cleaned.length>1500?'\n\n... (terpotong) ...':''}`;
            previewEl.appendChild(pre);
          }
        }else{
          const textBlob=new Blob([decryptedContent],{type:'text/plain'});
          fileSizeEl.textContent=bytesToMB(textBlob.size);
          mimeEl.textContent='text/plain';
          metaEl.classList.remove('hidden');
          previewEl.innerHTML='';
          const lbl=document.createElement('div');
          lbl.className='preview-name';lbl.textContent=`${person} — ${name}`;
          previewEl.appendChild(lbl);
          const pre=document.createElement('pre');
          pre.className='text-preview';
          pre.textContent=decryptedContent;
          previewEl.appendChild(pre);
        }

        setStatus('Dekripsi berhasil.','ok');

        const blobPB=new Blob([encryptedText],{type:'application/octet-stream'});
        const tmpUrlPB=URL.createObjectURL(blobPB);
        const blobDecrypted=currentBlob||new Blob([decryptedContent],{type:'application/octet-stream'});
        const tmpUrlDecrypted=URL.createObjectURL(blobDecrypted);

        const origExt=useAES?'enc':'pb';
        downloadOriginalBtn.href=tmpUrlPB;
        downloadOriginalBtn.download=`file.${origExt}`;
        downloadOriginalBtn.querySelector('span') && (downloadOriginalBtn.querySelector('span').textContent=`Unduh .${origExt}`);
        downloadOriginalBtn.classList.remove('hidden');
        downloadDecryptedBtn.href=tmpUrlDecrypted;
        downloadDecryptedBtn.download=name||'decrypted_file';
        downloadDecryptedBtn.classList.remove('hidden');

        if(url&&!useAES&&shift){
          const qrData=`${url} || ${shift}`;
          const safePerson=(person||'Anonim').replace(/[^a-zA-Z0-9 -]/g,'');
          const safeName=(name||'Konten').replace(/[^a-zA-Z0-9 -]/g,'');
          const qrFilename=`${safePerson} - ${safeName} - QR.png`.replace(/  +/g,' ').trim();
          const paddedCanvas=await generateQrCodeWithPadding(qrData,200,10);
          const qrCanvas=document.getElementById('qrCanvas');
          qrCanvas.width=paddedCanvas.width;qrCanvas.height=paddedCanvas.height;
          qrCanvas.getContext('2d').drawImage(paddedCanvas,0,0);
          document.getElementById('qrWrapper').addEventListener('click',()=>openModalSingle(paddedCanvas.toDataURL('image/png'),qrFilename));
          document.getElementById('downloadQrBtn').onclick=()=>{
            const a=document.createElement('a');a.href=paddedCanvas.toDataURL('image/png');a.download=qrFilename;a.click();
          };
          document.getElementById('qrSection').classList.remove('hidden');
        }

        window.addEventListener('beforeunload',()=>{
          URL.revokeObjectURL(tmpUrlPB);URL.revokeObjectURL(tmpUrlDecrypted);
          if(objectUrl)URL.revokeObjectURL(objectUrl);
        });

      }catch(err){
        setStatus(`Gagal: ${err.message}`,'err');
      }
    }

    async function ensureAndRunMain(){
      if(ensureAndRunMain._started)return;
      ensureAndRunMain._started=true;
      const params=new URLSearchParams(window.location.search);
      const url=params.get('url')||'';
      const shiftRaw=params.has('shift')?params.get('shift'):'';
      const person=params.get('person')||'';
      const name=params.get('name')||'';
      await loadAndDecrypt(url,shiftRaw,person,name);
      await fetchRelatedLinks(person);
    }

    /* ── Access gate ── */
    const lockedOverlay=document.getElementById('lockedOverlay');
    function showLockedOverlay(){lockedOverlay.style.display='flex';document.body.classList.add('blurred');}
    function hideLockedOverlay(){lockedOverlay.style.display='none';document.body.classList.remove('blurred');}
    function isLoggedIn(){return localStorage.getItem('dekrip_logged_in')==='true';}

    (function initAccessCheck(){
      if(isLoggedIn()){hideLockedOverlay();ensureAndRunMain();}
      else{showLockedOverlay();}
      window.addEventListener('focus',()=>{
        if(isLoggedIn()){hideLockedOverlay();ensureAndRunMain();}
      });
    })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daftar Konten Terenkripsi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
    </style>
</head>
<body class="flex items-start justify-center min-h-screen p-4 bg-gray-100">
    <div class="w-full max-w-6xl bg-white rounded-xl shadow-md p-6 mt-4">
        <div class="flex flex-col md:flex-row md:items-center md:justify-between mb-6 gap-4">
            <div>
                <h1 class="text-2xl font-bold text-gray-800">Daftar Konten Terenkripsi</h1>
                <p class="text-sm text-gray-500">Klik pada Nama File untuk mendekripsi & mengunduh otomatis</p>
            </div>
            
            <div class="flex flex-wrap items-center gap-3">
                <button onclick="exportToExcel()" class="bg-green-600 hover:bg-green-700 text-white text-sm font-medium px-4 py-2 rounded-lg transition-colors flex items-center gap-2 shadow-sm focus:outline-none focus:ring-2 focus:ring-green-500">
                    <i class="fas fa-file-excel"></i> Download Excel
                </button>
                
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-gray-400">
                        <i class="fas fa-search"></i>
                    </span>
                    <input type="text" id="searchInput" placeholder="Cari nama orang atau nama file..." 
                        class="pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 w-full md:w-64 transition-colors">
                </div>
            </div>
        </div>

        <div id="statusMessage" class="text-center py-8 text-gray-500">
            <i class="fas fa-spinner fa-spin text-2xl mb-2 text-blue-500"></i>
            <p>Mengambil data dari Supabase...</p>
        </div>

        <div class="overflow-x-auto hidden border border-gray-200 rounded-lg" id="tableContainer">
            <table class="min-w-full divide-y divide-gray-200 border-collapse">
                <thead class="bg-gray-50">
                    <tr class="divide-x divide-gray-200">
                        <th class="px-4 py-3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider w-16">No</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Nama Orang</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Nama File (Klik utk Download)</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Nama Konten</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Kategori</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Password Enkripsi</th>
                    </tr>
                </thead>
                <tbody class="bg-white divide-y divide-gray-200 divide-x divide-gray-200" id="linksTableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <div id="toast" class="fixed bottom-5 right-5 bg-gray-800 text-white text-sm px-4 py-3 rounded-lg shadow-lg pointer-events-none opacity-0 transition-opacity duration-300 flex items-center gap-2">
        <i class="fas fa-check-circle text-green-400" id="toastIcon"></i>
        <span id="toastText">Teks disalin</span>
    </div>

    <script>
        // ─── CONFIG SUPABASE ───────────────────────────────────────────────────
        const SUPABASE_URL = 'https://qzdvdfebkzlwkhvxwsju.supabase.co/rest/v1/links';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF6ZHZkZmVia3psd2todnh3c2p1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzcyMTA4OTksImV4cCI6MjA1Mjc4Njg5OX0.Z9XKmX49vu0kZwn6YMom8QeLNNdKQMXCIkxcIoHKQFs';

        let allData = []; // Menyimpan master data untuk fitur pencarian

        // ─── TOAST NOTIFICATION ───────────────────────────────────────────────
        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toastIcon');
            const text = document.getElementById('toastText');
            
            text.textContent = message;
            icon.className = isError ? "fas fa-exclamation-circle text-red-400" : "fas fa-check-circle text-green-400";
            
            toast.classList.remove('opacity-0');
            setTimeout(() => toast.classList.add('opacity-0'), 2500);
        }

        // ─── AMBIL DATA DARI SUPABASE VIA REST API ─────────────────────────────
        async function fetchLinks() {
            const statusMessage = document.getElementById('statusMessage');
            const tableContainer = document.getElementById('tableContainer');

            try {
                const response = await fetch(`${SUPABASE_URL}?select=*&order=created_at.desc`, {
                    method: 'GET',
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) throw new Error(`HTTP Error! Status: ${response.status}`);
                
                allData = await response.json();
                
                if(allData.length === 0) {
                    statusMessage.innerHTML = '<i class="fas fa-folder-open text-2xl mb-2 text-gray-400"></i><p>Belum ada data di tabel links.</p>';
                    return;
                }

                statusMessage.classList.add('hidden');
                tableContainer.classList.remove('hidden');
                renderTable(allData);

            } catch (error) {
                console.error(error);
                statusMessage.innerHTML = `<i class="fas fa-exclamation-triangle text-2xl mb-2 text-red-500"></i><p class="text-red-600">Gagal memuat data: ${error.message}</p>`;
            }
        }

        // ─── RENDER DATA KE TABEL ─────────────────────────────────────────────
        function renderTable(data) {
            const tbody = document.getElementById('linksTableBody');
            tbody.innerHTML = '';

            data.forEach((item, index) => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-gray-50 transition-colors divide-x divide-gray-200";

                const shortPassword = item.password ? item.password.substring(0, 8) + '...' : '-';

                // ── Kolom No ──
                const tdNo = document.createElement('td');
                tdNo.className = "px-4 py-4 whitespace-nowrap text-sm text-center text-gray-500 font-medium";
                tdNo.textContent = index + 1;

                // ── Kolom Nama Orang ──
                const tdPerson = document.createElement('td');
                tdPerson.className = "px-6 py-4 whitespace-nowrap text-sm font-semibold text-gray-700";
                tdPerson.textContent = item.person_name || '-';

                // ── Kolom Nama File ──
                const tdFile = document.createElement('td');
                tdFile.className = "px-6 py-4 whitespace-nowrap text-sm bg-gray-50/50";

                if (item.nama_file) {
                    if (item.url) {
                        const btn = document.createElement('button');
                        btn.className = "text-blue-600 hover:text-blue-800 hover:underline text-left font-mono focus:outline-none flex items-center gap-1.5 transition-colors";

                        const icon = document.createElement('i');
                        icon.className = "fas fa-download text-xs opacity-50";

                        const nameSpan = document.createElement('span');
                        nameSpan.textContent = item.nama_file; // textContent aman, tidak perlu escape

                        btn.appendChild(icon);
                        btn.appendChild(nameSpan);

                        // Simpan data di dataset agar tidak perlu serialisasi ke string JS
                        btn.dataset.url = item.url;
                        btn.dataset.password = item.password || '';
                        btn.dataset.filename = item.nama_file;

                        btn.addEventListener('click', function () {
                            downloadFile(this.dataset.url, this.dataset.filename);
                        });

                        tdFile.appendChild(btn);
                    } else {
                        const span = document.createElement('span');
                        span.className = "text-gray-500 font-mono";
                        span.textContent = item.nama_file;
                        tdFile.appendChild(span);
                    }
                } else {
                    tdFile.textContent = '-';
                }

                // ── Kolom Nama Konten ──
                const tdName = document.createElement('td');
                tdName.className = "px-6 py-4 whitespace-nowrap text-sm text-gray-600";
                tdName.textContent = item.name || '-';

                // ── Kolom Kategori ──
                const tdCategory = document.createElement('td');
                tdCategory.className = "px-6 py-4 whitespace-nowrap text-sm text-gray-500";
                const categorySpan = document.createElement('span');
                categorySpan.className = "px-2 py-1 text-xs bg-blue-50 text-blue-600 rounded-full border border-blue-100";
                categorySpan.textContent = item.category || 'Umum';
                tdCategory.appendChild(categorySpan);

                // ── Kolom Password ──
                const tdPassword = document.createElement('td');
                tdPassword.className = "px-6 py-4 whitespace-nowrap text-sm";

                if (item.password) {
                    const pwBtn = document.createElement('button');
                    pwBtn.className = "bg-yellow-50 hover:bg-yellow-100 text-yellow-700 text-xs px-2 py-1 rounded border border-yellow-200 transition-colors flex items-center inline-flex gap-1";
                    pwBtn.title = "Salin Password Lengkap";
                    pwBtn.dataset.password = item.password;
                    pwBtn.addEventListener('click', function () {
                        copyToClipboard(this.dataset.password);
                    });

                    const keyIcon = document.createElement('i');
                    keyIcon.className = "fas fa-key";
                    const pwSpan = document.createElement('span');
                    pwSpan.textContent = shortPassword;
                    const copyIcon = document.createElement('i');
                    copyIcon.className = "fas fa-copy ml-1 opacity-60";

                    pwBtn.appendChild(keyIcon);
                    pwBtn.appendChild(pwSpan);
                    pwBtn.appendChild(copyIcon);
                    tdPassword.appendChild(pwBtn);
                } else {
                    const noPwSpan = document.createElement('span');
                    noPwSpan.className = "text-gray-400 text-xs";
                    noPwSpan.textContent = "No Password";
                    tdPassword.appendChild(noPwSpan);
                }

                tr.appendChild(tdNo);
                tr.appendChild(tdPerson);
                tr.appendChild(tdFile);
                tr.appendChild(tdName);
                tr.appendChild(tdCategory);
                tr.appendChild(tdPassword);
                tbody.appendChild(tr);
            });
        }

        // ─── LOGIKA UNDUH FILE LANGSUNG DARI URL ──────────────────────────────
        async function downloadFile(url, filename) {
            if (!url) {
                showToast("Tautan link file tidak ditemukan.", true);
                return;
            }

            showToast("Mengunduh file...");
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error("Gagal mengambil file dari server.");
                const blob = await response.blob();

                const objectUrl = URL.createObjectURL(blob);
                const downloadLink = document.createElement('a');
                downloadLink.href = objectUrl;
                downloadLink.download = filename || 'file';
                document.body.appendChild(downloadLink);
                downloadLink.click();
                document.body.removeChild(downloadLink);
                URL.revokeObjectURL(objectUrl);

                showToast("File berhasil diunduh!");
            } catch (err) {
                console.error(err);
                showToast("Gagal mengunduh file: " + err.message, true);
            }
        }

        // ─── LOGIKA DOWNLOAD EXCEL (Mengekspor Semua Data Asli) ────────────────
        function exportToExcel() {
            if (allData.length === 0) {
                showToast("Tidak ada data untuk diunduh.", true);
                return;
            }

            showToast("Memproses file Excel...");

            // Urutkan data berdasarkan nama orang (abjad A-Z)
            const sortedData = [...allData].sort((a, b) => {
                const nameA = (a.person_name || '').toLowerCase();
                const nameB = (b.person_name || '').toLowerCase();
                return nameA.localeCompare(nameB, 'id');
            });

            // Petakan struktur kolom data JSON dari database ke format baris Excel
            const excelRows = sortedData.map((item, index) => ({
                "No": index + 1,
                "Nama Orang": item.person_name || '-',
                "Nama File": item.nama_file || '-',
                "Nama Konten": item.name || '-',
                "Kategori": item.category || 'Umum',
                "Password Enkripsi": item.password || '-',
                "URL File Terenkripsi": item.url || '-',
                "Waktu Input": item.created_at ? new Date(item.created_at).toLocaleString('id-ID') : '-'
            }));

            // Menginisialisasi Workbook SheetJS
            const worksheet = XLSX.utils.json_to_sheet(excelRows);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Data Konten");

            // Atur lebar kolom yang pas agar kolom password dan url yang panjang tidak tumpang tindih
            const colWidths = [
                { wch: 6 },  // No
                { wch: 25 }, // Nama Orang
                { wch: 25 }, // Nama File
                { wch: 30 }, // Nama Konten
                { wch: 15 }, // Kategori
                { wch: 45 }, // Password Enkripsi (Menampung full 100 karakter)
                { wch: 50 }, // URL File
                { wch: 22 }  // Waktu Input
            ];
            worksheet['!cols'] = colWidths;

            // Generate nama berkas unik dengan tanggal hari ini
            const dateStr = new Date().toISOString().slice(0, 10);
            const fileName = `Daftar_Konten_Supabase_${dateStr}.xlsx`;

            // Eksekusi download file biner xlsx di browser
            XLSX.writeFile(workbook, fileName);
            showToast("File Excel berhasil diunduh!");
        }

        // ─── UTILITY FUNCTIONS ────────────────────────────────────────────────
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                showToast("Password berhasil disalin!");
            }).catch(() => {
                showToast("Gagal menyalin teks.", true);
            });
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        function escapeJs(str) {
            if (!str) return '';
            return str.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '\\"');
        }

        // ─── LIVE SEARCH FILTER (Mencari Nama Orang & Nama File) ──────────────
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const keyword = e.target.value.toLowerCase();
            const filteredData = allData.filter(item => {
                const personNameMatch = item.person_name ? item.person_name.toLowerCase().includes(keyword) : false;
                const fileNameMatch = item.nama_file ? item.nama_file.toLowerCase().includes(keyword) : false;
                
                return personNameMatch || fileNameMatch;
            });
            renderTable(filteredData);
        });

        // Jalankan saat halaman siap
        fetchLinks();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Media Vault</title>
<style>
:root{
  --bg:#12141c;
  --panel:#1c1f2b;
  --border:#2a2e3d;
  --text:#e8e6df;
  --muted:#8b8fa3;
  --accent:#e8935a;
  --danger:#d9534f;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Segoe UI',system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  padding:40px 20px;
}
.container{max-width:900px;margin:0 auto}
header{text-align:center;margin-bottom:36px}
header h1{font-size:28px;letter-spacing:-0.5px;margin:0 0 6px}
header p{color:var(--muted);margin:0;font-size:14px}

.upload-box{
  background:var(--panel);
  border:1px dashed var(--border);
  border-radius:14px;
  padding:28px;
  display:flex;
  align-items:center;
  gap:16px;
  flex-wrap:wrap;
  justify-content:center;
}
#fileInput{color:var(--muted);font-size:13px}
#uploadBtn{
  background:var(--accent);
  color:#14161f;
  border:none;
  padding:10px 22px;
  border-radius:8px;
  font-weight:600;
  cursor:pointer;
  transition:transform .15s ease, opacity .15s ease;
}
#uploadBtn:hover{transform:translateY(-1px)}
#uploadBtn:disabled{opacity:.5;cursor:not-allowed;transform:none}
#status{text-align:center;color:var(--muted);font-size:13px;margin-top:14px;min-height:18px}

.gallery{
  margin-top:40px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:16px;
}
.card{
  position:relative;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:12px;
  overflow:hidden;
  aspect-ratio:1/1;
}
.card img,.card video{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}
.file-tile{
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:8px;
  padding:12px;
  text-align:center;
}
.file-tile .icon{font-size:38px;color:var(--accent)}
.file-tile .name{
  font-size:11px;
  color:var(--muted);
  word-break:break-all;
  line-height:1.3;
  max-height:42px;
  overflow:hidden;
}
.card-actions{
  position:absolute;
  top:8px;
  right:8px;
  display:flex;
  gap:6px;
  opacity:0;
  transition:opacity .15s ease;
}
.card:hover .card-actions{opacity:1}
.card-actions button{
  background:rgba(20,22,31,0.85);
  width:28px;
  height:28px;
  border-radius:50%;
  cursor:pointer;
  font-size:14px;
  line-height:1;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:background .15s ease;
  border:none;
}
.del-btn{color:var(--danger);border:1px solid var(--danger)}
.del-btn:hover{background:var(--danger);color:#fff}
.dl-btn{color:var(--accent);border:1px solid var(--accent)}
.dl-btn:hover{background:var(--accent);color:#14161f}

.empty{
  grid-column:1/-1;
  text-align:center;
  color:var(--muted);
  padding:40px 0;
  font-size:14px;
}

.modal-overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(10,11,16,0.7);
  z-index:999;
  justify-content:center;
  align-items:center;
}
.modal-box{
  background:var(--panel);
  border:1px solid var(--border);
  padding:28px 34px;
  border-radius:14px;
  text-align:center;
  min-width:260px;
}
.modal-box p{margin:0 0 16px;font-size:15px}
.modal-box button{
  background:var(--accent);
  color:#14161f;
  border:none;
  padding:8px 20px;
  border-radius:8px;
  font-weight:600;
  cursor:pointer;
}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Media Vault</h1>
    <p>Simpan gambar dan video ke penyimpanan cloud</p>
  </header>

  <div class="upload-box">
    <input type="file" id="fileInput">
    <button id="uploadBtn" onclick="uploadFile()">Upload</button>
  </div>
  <p id="status"></p>

  <div class="gallery" id="gallery">
    <div class="empty" id="emptyMsg">Belum ada media yang diupload</div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <p id="modalMessage">Upload berhasil!</p>
    <button onclick="closeModal()">OK</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://qzdvdfebkzlwkhvxwsju.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF6ZHZkZmVia3psd2todnh3c2p1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzcyMTA4OTksImV4cCI6MjA1Mjc4Njg5OX0.Z9XKmX49vu0kZwn6YMom8QeLNNdKQMXCIkxcIoHKQFs";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const BUCKET = "media";

function showModal(message) {
  document.getElementById("modalMessage").textContent = message;
  document.getElementById("modalOverlay").style.display = "flex";
}
function closeModal() {
  document.getElementById("modalOverlay").style.display = "none";
}

function originalName(path) {
  const idx = path.indexOf("_");
  return idx === -1 ? path : path.slice(idx + 1);
}

async function downloadFile(path) {
  const { data, error } = await sb.storage.from(BUCKET).download(path);
  if (error) {
    showModal("Gagal mengunduh: " + error.message);
    return;
  }
  const url = URL.createObjectURL(data);
  const a = document.createElement("a");
  a.href = url;
  a.download = originalName(path);
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function fileKind(name) {
  if (/\.(png|jpe?g|gif|webp|svg|bmp)$/i.test(name)) return "image";
  if (/\.(mp4|webm|mov|avi|mkv)$/i.test(name)) return "video";
  return "file";
}

function renderCard(path, url, kind) {
  const card = document.createElement("div");
  card.className = "card";
  card.dataset.path = path;
  if (kind === "video") {
    card.innerHTML = `<video src="${url}" controls></video>`;
  } else if (kind === "image") {
    card.innerHTML = `<img src="${url}">`;
  } else {
    card.innerHTML = `<div class="file-tile"><span class="icon">📄</span><span class="name">${originalName(path)}</span></div>`;
  }

  const actions = document.createElement("div");
  actions.className = "card-actions";

  const dl = document.createElement("button");
  dl.className = "dl-btn";
  dl.textContent = "⭳";
  dl.onclick = () => downloadFile(path);

  const del = document.createElement("button");
  del.className = "del-btn";
  del.textContent = "✕";
  del.onclick = () => deleteFile(path, card);

  actions.appendChild(dl);
  actions.appendChild(del);
  card.appendChild(actions);
  document.getElementById("gallery").appendChild(card);
  document.getElementById("emptyMsg").style.display = "none";
}

async function loadGallery() {
  const { data, error } = await sb.storage.from(BUCKET).list("", { sortBy: { column: "created_at", order: "desc" } });
  if (error || !data || data.length === 0) return;
  document.getElementById("emptyMsg").style.display = "none";
  data.forEach(item => {
    const { data: urlData } = sb.storage.from(BUCKET).getPublicUrl(item.name);
    renderCard(item.name, urlData.publicUrl, fileKind(item.name));
  });
}

async function uploadFile() {
  const input = document.getElementById("fileInput");
  const file = input.files[0];
  if (!file) return;
  const btn = document.getElementById("uploadBtn");
  const status = document.getElementById("status");
  btn.disabled = true;
  status.textContent = "Mengupload...";

  const path = `${Date.now()}_${file.name}`;
  const { error } = await sb.storage.from(BUCKET).upload(path, file, {
    cacheControl: "3600",
    upsert: false
  });

  btn.disabled = false;

  if (error) {
    status.textContent = "Gagal: " + error.message;
    showModal("Upload gagal: " + error.message);
    return;
  }

  const { data: urlData } = sb.storage.from(BUCKET).getPublicUrl(path);
  renderCard(path, urlData.publicUrl, fileKind(file.name));
  status.textContent = "";
  input.value = "";
  showModal("Upload berhasil!");
}

async function deleteFile(path, card) {
  if (!confirm("Hapus media ini?")) return;
  const { data, error } = await sb.storage.from(BUCKET).remove([path]);

  if (error) {
    showModal("Gagal menghapus: " + error.message);
    return;
  }
  if (!data || data.length === 0) {
    showModal("Gagal menghapus: tidak ada izin (cek RLS policy delete di Supabase)");
    return;
  }

  const { data: check } = await sb.storage.from(BUCKET).list("", { search: path });
  const stillExists = check && check.some(f => f.name === path);
  if (stillExists) {
    showModal("Gagal menghapus: file masih ada di server");
    return;
  }

  card.remove();
  if (document.getElementById("gallery").children.length === 1) {
    document.getElementById("emptyMsg").style.display = "block";
  }
  showModal("Media berhasil dihapus");
}

loadGallery();
</script>
</body>
</html>
